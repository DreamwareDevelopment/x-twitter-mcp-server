# fly.toml app configuration file generated for x-twitter-mcp on 2026-05-14T15:11:58-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'x-twitter-mcp'
primary_region = 'lax'
kill_signal = 'SIGINT'
kill_timeout = '5s'

# FastMCP serves each request on a fresh transport (no in-memory MCP session
# registry), so long-lived Managed-Agent sessions survive this machine's
# scale-to-zero restarts. Without it, a session whose MCP connection predates a
# restart gets 404/"session terminated" on every call after the machine sleeps.
[env]
  FASTMCP_STATELESS_HTTP = 'true'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256

[[mounts]]
  source = 'twitter_oauth_state'
  destination = '/data'
  initial_size = '1'
